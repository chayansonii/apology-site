<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  color: white;
}

/* Slides */
.slide {
  position: absolute;
  width: 100%;
  height: 100vh;
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 5s ease;
  filter: blur(8px);
}

/* ACTIVE SLIDE */
.slide.active {
  opacity: 1;
  filter: blur(0);
}

/* 👉 FIX FOR CLICK ISSUE */
.slide {
  pointer-events: none;
}
.slide.active {
  pointer-events: auto;
}

.btn {
  z-index: 10;
  position: relative;
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff6f91, #ff9671);
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* Overlay */
.overlay {
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 20px;
  max-width: 700px;
  text-align: center;
}

/* Typing */
#typing {
  font-size: 22px;
  min-height: 120px;
}

/* Response */
#response {
  margin-top: 20px;
  font-size: 22px;
  color: #ffd6e0;
}

/* Hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 18px;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const slidesData = [
  {img:1, text:"Hey… ❤️<br><br>Please don’t skip this…"},
  {img:2, typing:true},
  {img:3, text:"I don’t want to lose this…<br><br>Not you… not us…"},
  {img:4, text:"You matter to me…<br><br>More than my ego."}
];

/* 👉 ADD APOLOGY TEXT FOR ALL OTHER PHOTOS */
const extraTexts = [
  "I miss us being normal…",
  "I know I messed up…",
  "You didn’t deserve that…",
  "I wish I handled things better…",
  "You mean a lot to me…",
  "I hate seeing you upset…",
  "I’m trying to fix this…",
  "I really care about you…",
  "I don’t want distance between us…",
  "I’m learning from this…",
  "I’ll do better… I promise…",
  "I just want you back smiling…",
  "I know I hurt you…",
  "And I’m really sorry…",
  "Please don’t stay upset forever…",
  "You’re too important to lose…",
  "I’m not giving up on us…"
];

/* Images 5–21 with text */
for(let i=5;i<=21;i++){
  slidesData.push({
    img:i,
    text: extraTexts[(i-5) % extraTexts.length]
  });
}

/* Final slide */
slidesData.push({img:22, final:true});

let current = 0;
let musicStarted = false;

/* Create Slides */
slidesData.forEach((slide,i)=>{
  const div = document.createElement("div");
  div.className = "slide";
  if(i===0) div.classList.add("active");
  div.style.backgroundImage = `url('images/img${slide.img}.jpg')`;

  const overlay = document.createElement("div");
  overlay.className = "overlay";

  if(slide.typing){
    overlay.innerHTML = `<div id="typing"></div><button class="btn" onclick="next()">Next</button>`;
  }
  else if(slide.final){
    overlay.innerHTML = `
      <h1>Still upset?</h1>
      <button class="btn" onclick="angry()">Still Angry 😒</button>
      <button class="btn" onclick="forgive()">Maybe Forgive 🙂</button>
      <p id="response"></p>
    `;
  }
  else{
    overlay.innerHTML = `
      <h1>${slide.text}</h1>
      <button class="btn" onclick="next()">Next</button>
    `;
  }

  div.appendChild(overlay);
  document.body.appendChild(div);
});

const slides = document.querySelectorAll(".slide");

/* Next */
function next(){
  startMusic();
  if(current < slides.length - 1){
    slides[current].classList.remove("active");
    current++;
    slides[current].classList.add("active");
  }
}

/* 👉 UPDATED INTERVAL = 10 sec */
setInterval(()=>{
  if(current < slides.length-1){
    next();
  }
}, 10000);

/* Music fix */
function startMusic(){
  if(!musicStarted){
    const music = document.getElementById("bgMusic");
    music.play().catch(()=>{});
    musicStarted = true;
  }
}

/* Typing */
const text = "I know you’re upset...\n\nAnd honestly, you’re right.\n\nI shouldn’t have to make you cry and should not hurt you.\n\nI hate that I made you feel this way.\n\nYou mean everything to me.\n\nI’m really sorry.";
let i=0;

function typeWriter(){
  const el = document.getElementById("typing");
  if(!el) return;
  if(i<text.length){
    el.innerHTML += text.charAt(i)==="\n"?"<br><br>":text.charAt(i);
    i++;
    setTimeout(typeWriter,40);
  }
}
setTimeout(typeWriter,1000);

/* Buttons */
function angry(){
  startMusic();
  document.getElementById("response").innerHTML =
  "I know you are… and you have every right to be.<br>I’ll wait for you ❤️";
}

function forgive(){
  startMusic();
  document.getElementById("response").innerHTML =
  "Thank you… this means everything to me ❤️";
}

/* Hearts */
function createHeart(){
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);

/* Cursor hearts */
document.addEventListener("mousemove",function(e){
  const heart=document.createElement("div");
  heart.innerHTML="❤️";
  heart.style.position="fixed";
  heart.style.left=e.clientX+"px";
  heart.style.top=e.clientY+"px";
  heart.style.fontSize="12px";
  heart.style.pointerEvents="none";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),600);
});
</script>

</body>
</html>
